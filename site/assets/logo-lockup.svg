<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 128" role="img" aria-label="f00 directory lister">
  <title>f00 lockup</title>
  <desc>Brand mark + wordmark for headers and press kits.</desc>
  <!-- mark -->
  <svg x="0" y="0" width="128" height="128" viewBox="0 0 512 512">
    <rect width="512" height="512" rx="96" fill="#07090c"/>
    <rect x="72" y="88" width="368" height="336" rx="28" fill="#11161e" stroke="#1c2430" stroke-width="6"/>
    <circle cx="112" cy="128" r="10" fill="#5c6778"/>
    <circle cx="144" cy="128" r="10" fill="#5c6778"/>
    <circle cx="176" cy="128" r="10" fill="#3ecf8e"/>
    <g fill="#2a3544">
      <rect x="112" y="176" width="200" height="22" rx="6"/>
      <rect x="112" y="224" width="288" height="22" rx="6"/>
      <rect x="112" y="272" width="160" height="22" rx="6"/>
      <rect x="112" y="320" width="248" height="22" rx="6"/>
      <rect x="112" y="368" width="120" height="22" rx="6"/>
    </g>
    <rect x="104" y="260" width="304" height="46" rx="10" fill="#3ecf8e" opacity="0.14"/>
    <rect x="112" y="272" width="160" height="22" rx="6" fill="#3ecf8e"/>
    <text x="300" y="136"
          font-family="ui-monospace, 'IBM Plex Mono', Menlo, monospace"
          font-size="28" font-weight="600" fill="#8b97a8" letter-spacing="1">f00</text>
  </svg>
  <!-- wordmark -->
  <text x="152" y="78"
        font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', Menlo, monospace"
        font-size="56" font-weight="600" fill="#e8edf4" letter-spacing="-2">f00</text>
  <text x="152" y="108"
        font-family="ui-monospace, 'IBM Plex Mono', Menlo, monospace"
        font-size="18" font-weight="500" fill="#8b97a8">directory lister</text>
</svg>
