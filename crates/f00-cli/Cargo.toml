[package]
name = "f00-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "f00 command-line interface"
rust-version.workspace = true

[[bin]]
name = "f00"
path = "src/main.rs"

[dependencies]
f00-core = { workspace = true }
f00-format = { workspace = true }
f00-compat = { workspace = true }
f00-git = { workspace = true, optional = true }
f00-archive = { workspace = true, optional = true }
f00-tui = { workspace = true, optional = true }
anyhow = { workspace = true }
clap = { workspace = true }
directories = { workspace = true }
serde = { workspace = true }
terminal_size = { workspace = true }
toml = { workspace = true }

[features]
default = ["git", "archives", "tui"]
git = ["dep:f00-git"]
archives = ["dep:f00-archive"]
tui = ["dep:f00-tui"]

[dev-dependencies]
serde_json = { workspace = true }
