# nfpm template for f00 ASM suite. Env: VERSION, ARCH (amd64|arm64), BIN_PATH, OUT_DIR, MAN_PATH
name: f00
arch: ${ARCH}
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: theesfeld <noreply@f00.sh>
description: |
  f00 — pure freestanding assembly GNU coreutils replacement suite (multicall).
  Modern UX by default; strict coreutils presentation under --core.
  Faster core path; --json/--csv with rich metadata.
homepage: https://f00.sh
license: MIT
contents:
  - src: ${BIN_PATH}
    dst: /usr/bin/f00
    file_info:
      mode: 0755
  - src: ${MAN_PATH}
    dst: /usr/share/man/man1/f00.1
    file_info:
      mode: 0644
overrides:
  deb:
    depends: []
  rpm:
    depends: []
