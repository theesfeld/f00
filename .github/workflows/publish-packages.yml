name: Publish packages

# Bootstrap / re-push package manager channels from the current repo manifests
# without cutting a new release. Used after secrets are first added.
on:
  workflow_dispatch:
    inputs:
      channels:
        description: "Comma list: homebrew,aur,all"
        required: false
        default: "all"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: chmod scripts
        run: chmod +x scripts/*.sh

      - name: Publish Homebrew tap
        if: ${{ github.event.inputs.channels == 'all' || contains(github.event.inputs.channels, 'homebrew') }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${HOMEBREW_TAP_TOKEN:-}" || { echo "HOMEBREW_TAP_TOKEN required" >&2; exit 1; }
          scripts/publish-homebrew-tap.sh Formula/f00.rb

      - name: Publish AUR
        if: ${{ github.event.inputs.channels == 'all' || contains(github.event.inputs.channels, 'aur') }}
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
          AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
        run: |
          set -euo pipefail
          test -n "${AUR_SSH_PRIVATE_KEY:-}" || { echo "AUR_SSH_PRIVATE_KEY required" >&2; exit 1; }
          scripts/publish-aur.sh packaging/aur
