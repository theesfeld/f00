name: Release

# Pure assembly multicall release (Linux x86-64 freestanding).
# Tag: vX.Y.Z → tarball + deb + rpm + Arch package.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    name: build linux x86_64 ASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nasm
        run: sudo apt-get update -qq && sudo apt-get install -y -qq nasm

      - name: Install nfpm
        run: |
          set -euo pipefail
          curl -sSLf https://github.com/goreleaser/nfpm/releases/download/v2.41.3/nfpm_2.41.3_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Version from tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: asm
        run: make -j"$(nproc)"

      - name: Quality gates
        working-directory: asm
        run: |
          set -euo pipefail
          make smoke
          bash benches/parity.sh
          bash benches/speed-gate.sh
          ./f00 --version

      - name: Package tarball
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          VER="${{ steps.meta.outputs.version }}"
          STAGE="dist/f00-${VER}-linux-x86_64"
          mkdir -p "$STAGE/man/man1"
          install -m755 asm/f00 "$STAGE/f00"
          if [[ -d asm/man/man1 ]]; then
            cp -a asm/man/man1/f00*.1 "$STAGE/man/man1/" 2>/dev/null || true
          fi
          for f in README.md LICENSE CHANGELOG.md; do
            [[ -f "$f" ]] && cp "$f" "$STAGE/"
          done
          mkdir -p dist
          tar -C dist -czf "dist/f00-${VER}-linux-x86_64.tar.gz" "f00-${VER}-linux-x86_64"
          cp "dist/f00-${VER}-linux-x86_64.tar.gz" "dist/f00-${VER}-x86_64-linux.tar.gz"
          (cd dist && sha256sum "f00-${VER}-linux-x86_64.tar.gz" "f00-${VER}-x86_64-linux.tar.gz" > SHA256SUMS)
          cat dist/SHA256SUMS
          echo "primary=dist/f00-${VER}-linux-x86_64.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build deb/rpm/arch packages
        run: |
          set -euo pipefail
          chmod +x scripts/build-linux-packages.sh
          scripts/build-linux-packages.sh "${{ steps.meta.outputs.version }}" dist dist
          (cd dist && sha256sum f00*.deb f00*.rpm f00*.pkg.tar.zst 2>/dev/null >> SHA256SUMS || true)
          cat dist/SHA256SUMS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: f00-linux-x86_64
          path: |
            dist/f00-*-linux-x86_64.tar.gz
            dist/f00-*-x86_64-linux.tar.gz
            dist/f00_*.deb
            dist/f00-*.rpm
            dist/f00-*.pkg.tar.zst
            dist/SHA256SUMS
          if-no-files-found: error

  publish:
    name: publish release
    needs: build-linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version from tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: f00-linux-x86_64
          path: release-assets

      - name: List assets
        run: find release-assets -type f | sort && cat release-assets/SHA256SUMS || true

      - name: Regenerate Homebrew + AUR manifests from release checksums
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          VER="${{ steps.meta.outputs.version }}"
          scripts/gen-homebrew-formula.sh "${VER}" release-assets/SHA256SUMS Formula/f00.rb
          scripts/gen-aur-pkgbuild.sh "${VER}" release-assets/SHA256SUMS packaging/aur/PKGBUILD
          echo "--- Formula ---"; head -40 Formula/f00.rb
          echo "--- PKGBUILD ---"; head -40 packaging/aur/PKGBUILD

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            release-assets/*
          body: |
            # f00tils ${{ steps.meta.outputs.tag }}

            **f00tils** — pure assembly GNU coreutils replacement (Linux x86-64 freestanding multicall; binary `f00`).

            ## Install

            ```bash
            # primary
            curl -fsSL https://f00.sh/install.sh | bash
            # pin
            curl -fsSL https://f00.sh/install.sh | F00_VERSION=${{ steps.meta.outputs.tag }} bash
            # packages
            #   deb:  f00_${{ steps.meta.outputs.version }}_amd64.deb
            #   rpm:  f00-${{ steps.meta.outputs.version }}-1.x86_64.rpm
            #   arch: f00-${{ steps.meta.outputs.version }}-1-x86_64.pkg.tar.zst
            #   brew: brew install theesfeld/tap/f00
            #   AUR:  yay -S f00
            # source
            git checkout ${{ steps.meta.outputs.tag }} && cd asm && make && make install
            ```

            ## Assets

            - `f00-${{ steps.meta.outputs.version }}-linux-x86_64.tar.gz` (preferred tarball / curl installer)
            - `f00-${{ steps.meta.outputs.version }}-x86_64-linux.tar.gz` (alias)
            - `f00_${{ steps.meta.outputs.version }}_amd64.deb`
            - `f00-${{ steps.meta.outputs.version }}-1.x86_64.rpm`
            - `f00-${{ steps.meta.outputs.version }}-1-x86_64.pkg.tar.zst`

            See [README](https://github.com/theesfeld/f00#readme) · https://f00.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "skip homebrew: no HOMEBREW_TAP_TOKEN"
            exit 0
          fi
          chmod +x scripts/*.sh
          scripts/publish-homebrew-tap.sh Formula/f00.rb

      - name: Publish AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
          AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
        run: |
          set -euo pipefail
          if [[ -z "${AUR_SSH_PRIVATE_KEY:-}" ]]; then
            echo "skip AUR: no AUR_SSH_PRIVATE_KEY"
            exit 0
          fi
          chmod +x scripts/*.sh
          scripts/publish-aur.sh packaging/aur
