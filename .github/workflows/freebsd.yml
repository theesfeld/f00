name: FreeBSD smoke

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  freebsd:
    name: FreeBSD cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          prepare: |
            pkg install -y rust
          run: |
            cargo test --workspace --no-default-features -p f00-cli
            cargo test -p f00-core
            cargo build -p f00-cli --release --no-default-features
            ./target/release/f00 --version
            ./target/release/f00 -1 .
