name: CI

# f00tils — Linux x86-64 freestanding ASM multicall
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asm-linux:
    name: pure ASM (linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nasm
        run: sudo apt-get update -qq && sudo apt-get install -y -qq nasm

      - name: Build multicall
        working-directory: asm
        run: make -j"$(nproc)"

      - name: Smoke
        working-directory: asm
        run: make smoke

      - name: Parity (--core vs GNU)
        working-directory: asm
        run: bash benches/parity.sh

      - name: Speed gate vs coreutils
        working-directory: asm
        run: bash benches/speed-gate.sh

      - name: Version surface
        working-directory: asm
        run: |
          set -euo pipefail
          ./f00 --version
          ./f00-ls --version
          test -x ./f00
          n=$(find . -maxdepth 1 -type l -name 'f00-*' | wc -l)
          echo "f00-* links: $n"
          test "$n" -ge 100

  man-present:
    name: man pages present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check man tree
        run: |
          set -euo pipefail
          test -f asm/man/man1/f00.1
          test -f asm/man/man1/f00-ls.1
          n=$(find asm/man/man1 -name 'f00*.1' | wc -l)
          echo "man pages: $n"
          test "$n" -ge 100

  install-script:
    name: install.sh dry (local binary)
    runs-on: ubuntu-latest
    needs: asm-linux
    steps:
      - uses: actions/checkout@v4
      - name: Install nasm
        run: sudo apt-get update -qq && sudo apt-get install -y -qq nasm
      - name: Build
        working-directory: asm
        run: make -j"$(nproc)"
      - name: Installer against F00_LOCAL
        run: |
          set -euo pipefail
          chmod +x install.sh
          tmp="$(mktemp -d)"
          INSTALL_DIR="${tmp}/bin" F00_LOCAL="${PWD}/asm" ADD_PATH=0 bash install.sh
          "${tmp}/bin/f00" --version
          "${tmp}/bin/f00-true"
          test -x "${tmp}/bin/f00-ls"
          test -x "${tmp}/bin/f00-wc"
