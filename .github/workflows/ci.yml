name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  asm-linux:
    name: pure ASM (linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nasm
        run: sudo apt-get update -qq && sudo apt-get install -y -qq nasm

      - name: Build multicall
        working-directory: asm
        run: make -j"$(nproc)"

      - name: Smoke
        working-directory: asm
        run: make smoke

      - name: Parity (--core vs GNU)
        working-directory: asm
        run: bash benches/parity.sh

      - name: Speed gate vs coreutils
        working-directory: asm
        run: bash benches/speed-gate.sh

      - name: Version surface
        working-directory: asm
        run: |
          set -euo pipefail
          ./f00 --version
          ./f00-ls --version
          test -x ./f00
          # util link count (UTILS + f00-[ + test)
          n=$(find . -maxdepth 1 -type l -name 'f00-*' | wc -l)
          echo "f00-* links: $n"
          test "$n" -ge 100

  man-present:
    name: man pages present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check man tree
        run: |
          set -euo pipefail
          test -f asm/man/man1/f00.1
          test -f asm/man/man1/f00-ls.1
          n=$(find asm/man/man1 -name 'f00*.1' | wc -l)
          echo "man pages: $n"
          test "$n" -ge 100
