name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt --all -- --check

  clippy-test:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace
      - name: cargo build --release
        run: cargo build --release --workspace

  features:
    name: feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace --all-features
        run: cargo test --workspace --all-features
      - name: cargo test -p f00 --no-default-features
        run: cargo test -p f00 --no-default-features
      - name: cargo test -p f00 --features full
        run: cargo test -p f00 --features full
      - name: cargo build -p f00-tui --release
        run: cargo build -p f00-tui --release

  # Criterion smoke: keep listing microbenches compiling and runnable (not a perf gate).
  bench:
    name: bench smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo bench (smoke)
        run: >
          cargo bench -p f00-core --bench list_bench --
          --sample-size 10
          --warm-up-time 1
          --measurement-time 1

  # Hard rule: man/f00.1 always matches the live CLI / product surface.
  man-sync:
    name: man page sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: check man/f00.1 vs f00 --help + version
        run: scripts/check-man-sync.sh
